<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>жү“е°Ҹдәә - жғ…з»ӘйҮҠж”ҫ</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }

    body {
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* йЎ¶йғЁж Ҹ */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      z-index: 10;
    }

    .counter {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 15px;
      font-weight: 600;
      color: #c2185b;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .counter span { font-size: 22px; font-weight: 800; }

    .face-btn {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      color: #c2185b;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      transition: transform 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .face-btn:active { transform: scale(0.93); background: rgba(255,255,255,0.95); }
    #file-input { display: none; }

    /* е°ҸдәәеҢәеҹҹ */
    .doll-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .doll-wrapper {
      position: relative;
      transition: transform 0.08s;
    }
    .doll-wrapper.hit {
      animation: hitShake 0.25s ease-out;
    }
    .doll-wrapper.hit-hard {
      animation: hitHard 0.35s ease-out;
    }

    @keyframes hitShake {
      0%   { transform: translateX(0) rotate(0); }
      20%  { transform: translateX(-12px) rotate(-4deg); }
      40%  { transform: translateX(10px) rotate(3deg); }
      60%  { transform: translateX(-8px) rotate(-2deg); }
      80%  { transform: translateX(5px) rotate(1deg); }
      100% { transform: translateX(0) rotate(0); }
    }

    @keyframes hitHard {
      0%   { transform: scale(1) rotate(0); }
      15%  { transform: scale(0.85) rotate(-8deg); }
      30%  { transform: scale(1.05) rotate(5deg); }
      50%  { transform: scale(0.9) rotate(-3deg); }
      70%  { transform: scale(1.02) rotate(2deg); }
      100% { transform: scale(1) rotate(0); }
    }

    .doll-default {
      width: 200px;
      height: 280px;
    }

    /* иҮӘе®ҡд№үи„ёйғЁеӣҫзүҮ вҖ” з»қеҜ№е®ҡдҪҚиҰҶзӣ– SVG еӨҙйғЁ */
    .doll-face-img {
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      top: 55px;
      left: 55px;
      display: none;
      border: 2px solid #e65100;
    }
    .doll-face-img.show {
      display: block;
    }

    /* жү“еҮ»зү№ж•Ҳж–Үеӯ— */
    .hit-effect {
      position: fixed;
      pointer-events: none;
      font-size: 40px;
      font-weight: 900;
      color: #d32f2f;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      animation: floatUp 0.7s ease-out forwards;
      z-index: 5;
    }
    .hit-effect.alt { color: #f57c00; font-size: 35px; }
    .hit-effect.crit { color: #c2185b; font-size: 50px; }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-120px) scale(1.3); }
    }

    /* еә•йғЁжҺ§еҲ¶ж Ҹ */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 20px max(20px, env(safe-area-inset-bottom));
      gap: 10px;
      z-index: 10;
    }

    /* ===== е·Ұдҫ§жӯҰеҷЁйҖүжӢ©ж Ҹ ===== */
    .weapon-bar {
      position: fixed;
      left: 8px;
      top: 60px;
      bottom: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 10;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .weapon-bar::-webkit-scrollbar { display: none; }

    .weapon-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .weapon-item {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid transparent;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      gap: 2px;
    }
    .weapon-item:active { transform: scale(0.88); }
    .weapon-item.active {
      border-color: #c2185b;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 2px 12px rgba(194,24,91,0.25);
    }
    .weapon-item .icon { font-size: 24px; line-height: 1; }
    .weapon-item .label {
      font-size: 9px;
      font-weight: 600;
      color: #666;
    }
    .weapon-item.active .label { color: #c2185b; }

    .hit-btn {
      width: 100%;
      max-width: 320px;
      height: 56px;
      border-radius: 28px;
      border: none;
      font-size: 20px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #e91e63, #c2185b);
      box-shadow: 0 6px 20px rgba(194,24,91,0.4);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 2px;
    }
    .hit-btn:active { transform: scale(0.95); box-shadow: 0 2px 10px rgba(194,24,91,0.3); }
    .hit-btn.auto-on {
      background: linear-gradient(135deg, #ff7043, #e64a19);
      box-shadow: 0 6px 20px rgba(230,74,25,0.4);
    }

    .auto-toggle {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none;
      border-radius: 20px;
      padding: 8px 24px;
      font-size: 14px;
      color: #c2185b;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .auto-toggle:active { transform: scale(0.95); }
    .auto-toggle.active {
      background: rgba(194,24,91,0.1);
      color: #880e4f;
    }

    /* иҝһеҮ»жҸҗзӨә */
    .combo {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 6px 18px;
      font-size: 14px;
      font-weight: 700;
      color: #e91e63;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
    }
    .combo.show { opacity: 1; }

    /* зўҺеұ‘зІ’еӯҗ */
    .particle {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFly 0.6s ease-out forwards;
    }
    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
    }

    /* ===== жҠ•жҺ·зү©еҠЁз”» ===== */
    .projectile {
      position: fixed;
      pointer-events: none;
      z-index: 20;
      font-size: 60px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }
    @keyframes throwFromLeft {
      0%   { left: -80px; top: 60%; transform: rotate(-30deg) scale(0.5); opacity: 1; }
      60%  { left: 50%; top: 35%; transform: rotate(15deg) scale(1.2); opacity: 1; }
      80%  { left: var(--target-x); top: var(--target-y); transform: rotate(25deg) scale(1); opacity: 1; }
      100% { left: var(--target-x); top: var(--target-y); transform: rotate(25deg) scale(0.8); opacity: 0; }
    }
    @keyframes throwFromRight {
      0%   { left: calc(100% + 80px); top: 55%; transform: rotate(30deg) scale(0.5); opacity: 1; }
      60%  { left: 50%; top: 30%; transform: rotate(-15deg) scale(1.2); opacity: 1; }
      80%  { left: var(--target-x); top: var(--target-y); transform: rotate(-25deg) scale(1); opacity: 1; }
      100% { left: var(--target-x); top: var(--target-y); transform: rotate(-25deg) scale(0.8); opacity: 0; }
    }

    /* йёЎиӣӢзўҺиЈӮж•Ҳжһң */
    .egg-splat {
      position: fixed;
      pointer-events: none;
      z-index: 21;
    }
    @keyframes eggCrack {
      0%   { transform: scale(0.5); opacity: 1; }
      50%  { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    /* зӢјзүҷжЈ’жҢҘиҲһ */
    @keyframes clubSwing {
      0%   { left: -100px; top: 20%; transform: rotate(-60deg) scale(0.6); opacity: 1; }
      40%  { left: 45%; top: 25%; transform: rotate(30deg) scale(1.3); opacity: 1; }
      70%  { left: var(--target-x); top: var(--target-y); transform: rotate(45deg) scale(1); opacity: 1; }
      100% { left: var(--target-x); top: var(--target-y); transform: rotate(45deg) scale(0.7); opacity: 0; }
    }

    /* и”¬иҸңжҠ•жҺ· */
    @keyframes veggieThrow {
      0%   { left: -60px; top: 50%; transform: rotate(-20deg) scale(0.6) rotate(0deg); opacity: 1; }
      50%  { left: 50%; top: 30%; transform: rotate(10deg) scale(1.1) rotate(180deg); opacity: 1; }
      80%  { left: var(--target-x); top: var(--target-y); transform: rotate(20deg) scale(1) rotate(300deg); opacity: 1; }
      100% { left: var(--target-x); top: var(--target-y); transform: rotate(20deg) scale(0.7) rotate(360deg); opacity: 0; }
    }

    /* йёЎиӣӢй»„зү№ж•Ҳ */
    .yolk-splat {
      position: fixed;
      pointer-events: none;
      z-index: 19;
      border-radius: 50%;
      background: radial-gradient(circle, #fff176 0%, #fdd835 40%, #f9a825 100%);
      opacity: 0;
      animation: yolkSpread 0.8s ease-out forwards;
    }
    @keyframes yolkSpread {
      0%   { width: 0; height: 0; opacity: 1; transform: translate(-50%,-50%); }
      60%  { opacity: 0.8; }
      100% { width: 120px; height: 100px; opacity: 0; transform: translate(-50%,-50%); }
    }

    .egg-white {
      position: fixed;
      pointer-events: none;
      z-index: 18;
      background: rgba(255,255,255,0.85);
      border-radius: 50% 30% 60% 40%;
      opacity: 0;
      animation: whiteSpread 1s ease-out forwards;
    }
    @keyframes whiteSpread {
      0%   { width: 0; height: 0; opacity: 1; transform: translate(-50%,-50%) rotate(0deg); }
      50%  { opacity: 0.7; }
      100% { width: 90px; height: 70px; opacity: 0; transform: translate(-50%,-50%) rotate(45deg); }
    }

    /* ===================== иЈҒеүӘеј№зӘ— ===================== */
    .crop-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      flex-direction: column;
      padding: 20px;
    }
    .crop-overlay.show { display: flex; }

    .crop-modal {
      background: #fff;
      border-radius: 24px;
      padding: 24px 20px 20px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .crop-title {
      font-size: 18px;
      font-weight: 700;
      color: #333;
      text-align: center;
    }

    .crop-canvas-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      border-radius: 16px;
      overflow: hidden;
      background: #f5f5f5;
      touch-action: none;
      cursor: grab;
    }
    .crop-canvas-wrap:active { cursor: grabbing; }

    #crop-canvas {
      width: 280px;
      height: 280px;
      display: block;
    }

    .crop-hint {
      font-size: 12px;
      color: #888;
      text-align: center;
      line-height: 1.5;
    }
    .crop-privacy {
      font-size: 11px;
      color: #4caf50;
      font-weight: 500;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .crop-slider-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .crop-slider-wrap span {
      font-size: 14px;
      color: #666;
      font-weight: 600;
      white-space: nowrap;
    }
    .crop-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #e0e0e0;
      outline: none;
    }
    .crop-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e91e63, #c2185b);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(194,24,91,0.3);
    }
    .crop-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e91e63, #c2185b);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(194,24,91,0.3);
    }

    .crop-btns {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .crop-btn {
      flex: 1;
      height: 46px;
      border-radius: 23px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .crop-btn:active { transform: scale(0.95); }
    .crop-btn.cancel {
      background: #f5f5f5;
      color: #666;
    }
    .crop-btn.confirm {
      background: linear-gradient(135deg, #e91e63, #c2185b);
      color: white;
      box-shadow: 0 4px 16px rgba(194,24,91,0.3);
    }
  </style>
</head>
<body>

  <!-- йЎ¶йғЁж Ҹ -->
  <div class="top-bar">
    <div class="counter">е·Іжү“ <span id="count">0</span> дёӢ</div>
    <button class="face-btn" id="face-btn">рҹҺӯ жҚўи„ё</button>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <!-- иҝһеҮ»жҸҗзӨә -->
  <div class="combo" id="combo"></div>

  <!-- е°ҸдәәеҢәеҹҹ -->
  <div class="doll-area" id="doll-area">
    <div class="doll-wrapper" id="doll-wrapper">
      <!-- иҮӘе®ҡд№үи„ёйғЁеӣҫзүҮ вҖ” иҰҶзӣ– SVG еӨҙйғЁеңҶеҪўеҢәеҹҹ -->
      <img class="doll-face-img" id="face-img" alt="иҮӘе®ҡд№үи„ё">
      <svg class="doll-default" id="doll-svg" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
        <!-- й»ҳи®ӨеӨҙйғЁпјҲжӣҙжҳҺжҳҫпјҢеёҰиҫ№жЎҶпјү -->
        <circle id="head-bg" cx="100" cy="100" r="45" fill="#ffb74d" stroke="#e65100" stroke-width="2"/>

        <!-- зңјзқӣ -->
        <g id="head-features">
          <circle cx="82" cy="90" r="6" fill="#333"/>
          <circle cx="118" cy="90" r="6" fill="#333"/>
          <!-- еҳҙе·ҙпјҲе§”еұҲзҠ¶пјү -->
          <path d="M88 120 Q100 108 112 120" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
          <!-- и…®зәў -->
          <circle cx="72" cy="105" r="8" fill="#ff7043" opacity="0.5"/>
          <circle cx="128" cy="105" r="8" fill="#ff7043" opacity="0.5"/>
        </g>

        <!-- иә«дҪ“ -->
        <rect x="70" y="140" width="60" height="70" rx="20" fill="#ef9a9a"/>
        <!-- жүӢ -->
        <circle cx="45" cy="165" r="16" fill="#ffccbc"/>
        <circle cx="155" cy="165" r="16" fill="#ffccbc"/>
        <!-- и„ҡ -->
        <rect x="75" y="205" width="20" height="40" rx="10" fill="#ef9a9a"/>
        <rect x="105" y="205" width="20" height="40" rx="10" fill="#ef9a9a"/>

        <!-- иў«жү“зҡ„зү№ж•ҲеҚҒеӯ— -->
        <g id="hit-mark" opacity="0">
          <line x1="70" y1="75" x2="90" y2="95" stroke="#d32f2f" stroke-width="4" stroke-linecap="round"/>
          <line x1="90" y1="75" x2="70" y2="95" stroke="#d32f2f" stroke-width="4" stroke-linecap="round"/>
          <line x1="110" y1="75" x2="130" y2="95" stroke="#d32f2f" stroke-width="4" stroke-linecap="round"/>
          <line x1="130" y1="75" x2="110" y2="95" stroke="#d32f2f" stroke-width="4" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
  </div>

  <!-- е·Ұдҫ§жӯҰеҷЁйҖүжӢ©ж Ҹ -->
  <div class="weapon-bar" id="weapon-bar">
    <div class="weapon-list" id="weapon-list"></div>
  </div>

  <!-- еә•йғЁжҺ§еҲ¶ж Ҹ -->
  <div class="bottom-bar">
    <button class="auto-toggle" id="auto-toggle">рҹ”Ғ иҮӘеҠЁжҡҙжү“: е…і</button>
    <button class="hit-btn" id="hit-btn">рҹҺІ жү“пјҒ</button>
  </div>

  <!-- ===================== иЈҒеүӘеј№зӘ— ===================== -->
  <div class="crop-overlay" id="crop-overlay">
    <div class="crop-modal">
      <div class="crop-title">и°ғж•ҙи„ёйғЁдҪҚзҪ®</div>
      <div class="crop-canvas-wrap" id="crop-wrap">
        <canvas id="crop-canvas" width="280" height="280"></canvas>
      </div>
      <div class="crop-hint">рҹ‘Ҷ жӢ–еҠЁи°ғж•ҙдҪҚзҪ®<br>рҹӨҸ еҸҢжҢҮ/ж»ҡиҪ®зј©ж”ҫ</div>
      <div class="crop-privacy">рҹ”’ еӣҫзүҮд»…дҝқеӯҳеңЁжӮЁи®ҫеӨҮдёҠпјҢдёҚдјҡдёҠдј еҲ°д»»дҪ•жңҚеҠЎеҷЁ</div>
      <div class="crop-slider-wrap">
        <span>е°Ҹ</span>
        <input type="range" class="crop-slider" id="crop-scale" min="30" max="300" value="100">
        <span>еӨ§</span>
      </div>
      <div class="crop-btns">
        <button class="crop-btn cancel" id="crop-cancel">еҸ–ж¶Ҳ</button>
        <button class="crop-btn confirm" id="crop-confirm">зЎ®и®ӨжҚўи„ё</button>
      </div>
    </div>
  </div>

<script>
    // ============ жӯҰеҷЁе®ҡд№ү ============
    const WEAPONS = [
      { id: 'mixed',   icon: 'рҹҺІ', label: 'ж··еҗҲ',   hitTexts: ['ж··еҗҲеҸҢжү“пјҒ','д№ұжӢіпјҒ','зӢӮйЈҺжҡҙйӣЁпјҒ','рҹҺІ'], critTexts: ['з»ҲжһҒиҝһеҮ»пјҒ','ж»ЎеұҸд№ұжү“пјҒ','рҹҢӘпёҸрҹ’Ҙ'] },
      { id: 'fist',    icon: 'рҹ‘Ҡ', label: 'жӢіеӨҙ',   hitTexts: ['е•ӘпјҒ','е’ҡпјҒ','duangпјҒ','еҳӯпјҒ','рҹ’Ҙ','рҹ‘Ҡ'], critTexts: ['жҡҙеҮ»пјҒ','йҮҚжӢіпјҒ','рҹ’ў'] },
      { id: 'shoe',    icon: 'рҹ‘ҹ', label: 'жү”йһӢ',   hitTexts: ['е•ӘеҸҪпјҒ','йһӢеҮ»пјҒ','йЈһйһӢпјҒ','рҹ’ў','рҹ‘ҹ'], critTexts: ['йһӢиўӯжҡҙеҮ»пјҒ','иҮҙе‘ҪйһӢеҮ»пјҒ','рҹ‘һрҹ’Ҙ'] },
      { id: 'egg',     icon: 'рҹҘҡ', label: 'йёЎиӣӢ',   hitTexts: ['е’”еҡ“пјҒ','иӣӢзўҺпјҒ','й»„дәҶпјҒ','рҹҘҡ','рҹ’ӣ'], critTexts: ['иӣӢзўҺж— ж•ҢпјҒ','ж»ЎеұҸиӣӢй»„пјҒ','рҹҘҡрҹ’Ҙ'] },
      { id: 'veggie',  icon: 'рҹҘ¬', label: 'и”¬иҸң',   hitTexts: ['е•ӘпјҒ','иҸңиўӯпјҒ','з»ҝиүІйЈҹе“ҒпјҒ','рҹҘ¬','рҹҚ…'], critTexts: ['и”¬иҸңжҡҙеҮ»пјҒ','иҗҘе…»еҲ°дҪҚпјҒ','рҹҘҰрҹ’Ҙ'] },
      { id: 'club',    icon: 'рҹӘ“', label: 'зӢјзүҷжЈ’', hitTexts: ['иҪ°пјҒ','йҮҚеҮ»пјҒ','зӢјзүҷпјҒ','рҹӘ“','рҹ’ў'], critTexts: ['жҜҒзҒӯжү“еҮ»пјҒ','зӢјзүҷжҡҙеҮ»пјҒ','вҡ”пёҸрҹ’Ҙ'] },
    ];

    let currentWeapon = 'mixed';

    // ============ еҲқе§ӢеҢ–жӯҰеҷЁж Ҹ ============
    const weaponList = document.getElementById('weapon-list');
    WEAPONS.forEach(w => {
      const item = document.createElement('div');
      item.className = 'weapon-item' + (w.id === currentWeapon ? ' active' : '');
      item.dataset.id = w.id;
      item.innerHTML = `<span class="icon">${w.icon}</span><span class="label">${w.label}</span>`;
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        currentWeapon = w.id;
        document.querySelectorAll('.weapon-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        // жӣҙж–°жү“еҮ»жҢүй’®ж–Үеӯ—
        document.getElementById('hit-btn').textContent = `${w.icon} жү“пјҒ`;
      });
      weaponList.appendChild(item);
    });

    // ============ йҹіж•Ҳзі»з»ҹ ============
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playHitSound(weaponId) {
      ensureAudio();
      const ctx = audioCtx;
      const now = ctx.currentTime;

      if (weaponId === 'egg') {
        // йёЎиӣӢзўҺиЈӮйҹіж•Ҳ вҖ” зҹӯдҝғзҡ„й«ҳйў‘зўҺиЈӮеЈ°
        const bufferSize = ctx.sampleRate * 0.06;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 4);
        }
        const src = ctx.createBufferSource();
        src.buffer = buffer;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.6, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        const filter = ctx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = 2000;
        src.connect(filter).connect(gain).connect(ctx.destination);
        src.start(now);
        src.stop(now + 0.1);
        // дҪҺйў‘иӣӢй»„ж„ҹ
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
        const g2 = ctx.createGain();
        g2.gain.setValueAtTime(0.3, now);
        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.connect(g2).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.15);
        return;
      }

      if (weaponId === 'shoe') {
        // йһӢеӯҗ вҖ” иҪҜиҙЁжү“еҮ»еЈ°
        const bufferSize = ctx.sampleRate * 0.1;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
        }
        const src = ctx.createBufferSource();
        src.buffer = buffer;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 600;
        filter.Q.value = 0.8;
        src.connect(filter).connect(gain).connect(ctx.destination);
        src.start(now);
        src.stop(now + 0.15);
        return;
      }

      if (weaponId === 'club') {
        // зӢјзүҷжЈ’ вҖ” жІүйҮҚдҪҺйў‘жү“еҮ»
        const osc = ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.6, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        osc.connect(filter).connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.2);
        // йҮҚеҮ»еҷӘеЈ°
        const bufferSize = ctx.sampleRate * 0.12;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 5);
        }
        const nsrc = ctx.createBufferSource();
        nsrc.buffer = buffer;
        const ngain = ctx.createGain();
        ngain.gain.setValueAtTime(0.5, now);
        ngain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        nsrc.connect(ngain).connect(ctx.destination);
        nsrc.start(now);
        nsrc.stop(now + 0.18);
        return;
      }

      if (weaponId === 'veggie') {
        // и”¬иҸң вҖ” еӨҡжұҒжү“еҮ»еЈ°
        const bufferSize = ctx.sampleRate * 0.08;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3) * (0.5 + Math.sin(i * 0.1) * 0.5);
        }
        const src = ctx.createBufferSource();
        src.buffer = buffer;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1500;
        filter.Q.value = 1.2;
        src.connect(filter).connect(gain).connect(ctx.destination);
        src.start(now);
        src.stop(now + 0.12);
        return;
      }

      // й»ҳи®ӨжӢіеӨҙйҹіж•Ҳ
      const bufferSize = ctx.sampleRate * 0.08;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.5, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 800 + Math.random() * 600;
      filter.Q.value = 1;
      noise.connect(filter).connect(noiseGain).connect(ctx.destination);
      noise.start(now);
      noise.stop(now + 0.1);

      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);
      const oscGain = ctx.createGain();
      oscGain.gain.setValueAtTime(0.4, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(oscGain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.12);
    }

    function playCritSound(weaponId) {
      ensureAudio();
      const ctx = audioCtx;
      const now = ctx.currentTime;

      // жҡҙеҮ»йҖҡз”ЁпјҡжӣҙеӨ§зҡ„еҷӘеЈ° + дҪҺйў‘йңҮиҚЎ
      const bufferSize = ctx.sampleRate * 0.15;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.7, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1200;
      filter.Q.value = 2;
      noise.connect(filter).connect(noiseGain).connect(ctx.destination);
      noise.start(now);
      noise.stop(now + 0.2);

      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(100, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
      const oscGain = ctx.createGain();
      oscGain.gain.setValueAtTime(0.5, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      osc.connect(oscGain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.2);
    }

    // ============ жғЁеҸ«еЈ°еҗҲжҲҗ ============
    const SCREAM_VARIANTS = [
      // "е•Ҡ~" й«ҳйҹіеҲ°дҪҺйҹі
      () => { return { start: 900, end: 250, dur: 0.22, wave: 'triangle', vol: 0.35 }; },
      // "е—·~" дёӯйҹі
      () => { return { start: 700, end: 180, dur: 0.18, wave: 'sawtooth', vol: 0.3 }; },
      // "е“Һе“ҹ~" жңүйўӨйҹі
      () => { return { start: 600, end: 200, dur: 0.25, wave: 'triangle', vol: 0.4, vibrato: true }; },
      // "е‘ң~" дҪҺжІү
      () => { return { start: 500, end: 120, dur: 0.2, wave: 'sawtooth', vol: 0.35 }; },
    ];

    function playScream() {
      ensureAudio();
      const ctx = audioCtx;
      const now = ctx.currentTime;
      const variant = SCREAM_VARIANTS[Math.floor(Math.random() * SCREAM_VARIANTS.length)]();

      // дё»дҪ“еЈ°йҹі вҖ” йў‘зҺҮдёӢйҷҚжЁЎжӢҹ"е•Ҡ~"
      const osc = ctx.createOscillator();
      osc.type = variant.wave;
      osc.frequency.setValueAtTime(variant.start, now);
      osc.frequency.exponentialRampToValueAtTime(variant.end, now + variant.dur);

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(variant.vol, now + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, now + variant.dur);

      // дәәеЈ°ж»Өжіў
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(variant.start * 0.8, now);
      filter.frequency.exponentialRampToValueAtTime(variant.end * 0.8, now + variant.dur);
      filter.Q.value = 1.5;

      osc.connect(filter).connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + variant.dur + 0.05);

      // йўӨйҹіж•ҲжһңпјҲйғЁеҲҶеҸҳдҪ“пјү
      if (variant.vibrato) {
        const lfo = ctx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = 12;
        const lfoGain = ctx.createGain();
        lfoGain.gain.value = 30;
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        lfo.start(now);
        lfo.stop(now + variant.dur);
      }

      // еҳ¶еҳ¶еҷӘеЈ°еұӮ
      const nSize = ctx.sampleRate * variant.dur;
      const nBuffer = ctx.createBuffer(1, nSize, ctx.sampleRate);
      const nData = nBuffer.getChannelData(0);
      for (let i = 0; i < nSize; i++) {
        nData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / nSize, 3) * 0.3;
      }
      const nSrc = ctx.createBufferSource();
      nSrc.buffer = nBuffer;
      const nGain = ctx.createGain();
      nGain.gain.setValueAtTime(0.15, now);
      nGain.gain.exponentialRampToValueAtTime(0.001, now + variant.dur);
      const nFilter = ctx.createBiquadFilter();
      nFilter.type = 'highpass';
      nFilter.frequency.value = 3000;
      nSrc.connect(nFilter).connect(nGain).connect(ctx.destination);
      nSrc.start(now);
      nSrc.stop(now + variant.dur);
    }

    // ============ зҠ¶жҖҒ ============
    let count = parseInt(localStorage.getItem('hit-count') || '0');
    let autoMode = false;
    let autoInterval = null;
    let comboCount = 0;
    let comboTimer = null;

    // DOM
    const countEl = document.getElementById('count');
    const dollArea = document.getElementById('doll-area');
    const dollWrapper = document.getElementById('doll-wrapper');
    const hitBtn = document.getElementById('hit-btn');
    const autoToggle = document.getElementById('auto-toggle');
    const faceBtn = document.getElementById('face-btn');
    const fileInput = document.getElementById('file-input');
    const comboEl = document.getElementById('combo');
    const hitMark = document.getElementById('hit-mark');

    // жҚўи„ёзӣёе…і
    const headBg = document.getElementById('head-bg');
    const headFeatures = document.getElementById('head-features');
    const faceImg = document.getElementById('face-img');

    countEl.textContent = count;

    // ============ еҠ иҪҪе·Ідҝқеӯҳзҡ„жҚўи„ё ============
    (function loadSavedFace() {
      const saved = localStorage.getItem('hit-doll-face');
      if (saved) applyFaceImage(saved);
    })();

    function applyFaceImage(dataUrl) {
      headBg.setAttribute('opacity', '0');
      headFeatures.style.display = 'none';
      faceImg.src = dataUrl;
      faceImg.classList.add('show');
      faceBtn.textContent = 'рҹҺӯ жҚўи„ё вң“';
    }

    function resetFace() {
      headBg.setAttribute('opacity', '1');
      headFeatures.style.display = 'block';
      faceImg.classList.remove('show');
      faceImg.src = '';
      localStorage.removeItem('hit-doll-face');
      faceBtn.textContent = 'рҹҺӯ жҚўи„ё';
    }

    // ============ иҺ·еҸ–е®һйҷ…жӯҰеҷЁпјҲж··еҗҲжЁЎејҸйҡҸжңәпјү ============
    function getActiveWeapon() {
      if (currentWeapon === 'mixed') {
        const realWeapons = WEAPONS.filter(w => w.id !== 'mixed');
        return realWeapons[Math.floor(Math.random() * realWeapons.length)];
      }
      return WEAPONS.find(w => w.id === currentWeapon) || WEAPONS[0];
    }

    // ============ жҠ•жҺ·еҠЁз”»зі»з»ҹ ============
    function animateProjectile(weaponId, onImpact) {
      const dollRect = dollWrapper.getBoundingClientRect();
      const targetX = dollRect.left + dollRect.width / 2;
      const targetY = dollRect.top + dollRect.height / 3;

      const proj = document.createElement('div');
      proj.className = 'projectile';

      let animName, icon;
      const fromLeft = Math.random() > 0.5;

      switch(weaponId) {
        case 'shoe':
          icon = 'рҹ‘ҹ';
          animName = fromLeft ? 'throwFromLeft' : 'throwFromRight';
          break;
        case 'veggie':
          icon = ['рҹҘ¬','рҹҚ…','рҹҘҰ','рҹҢҪ'][Math.floor(Math.random()*4)];
          animName = 'veggieThrow';
          break;
        case 'club':
          icon = 'рҹӘ“';
          animName = 'clubSwing';
          break;
        case 'egg':
          icon = 'рҹҘҡ';
          animName = fromLeft ? 'throwFromLeft' : 'throwFromRight';
          break;
        default:
          onImpact && onImpact();
          return;
      }

      proj.textContent = icon;
      proj.style.setProperty('--target-x', targetX + 'px');
      proj.style.setProperty('--target-y', targetY + 'px');
      proj.style.animation = `${animName} 0.4s ease-in forwards`;

      document.body.appendChild(proj);

      // е‘Ҫдёӯж—¶еҲ»пјҲеҠЁз”» 70% еӨ„и§ҰеҸ‘пјү
      setTimeout(() => {
        onImpact && onImpact();
        // йёЎиӣӢзү№ж®Ҡж•Ҳжһң
        if (weaponId === 'egg') showEggSplat(targetX, targetY);
      }, 280);

      setTimeout(() => proj.remove(), 500);
    }

    // ============ йёЎиӣӢзўҺиЈӮзү№ж•Ҳ ============
    function showEggSplat(x, y) {
      // иӣӢй»„
      const yolk = document.createElement('div');
      yolk.className = 'yolk-splat';
      yolk.style.left = x + 'px';
      yolk.style.top = y + 'px';
      document.body.appendChild(yolk);
      setTimeout(() => yolk.remove(), 900);

      // иӣӢзҷҪпјҲеӨҡдёӘпјү
      for (let i = 0; i < 3; i++) {
        const white = document.createElement('div');
        white.className = 'egg-white';
        const angle = (Math.PI * 2 / 3) * i;
        white.style.left = (x + Math.cos(angle) * 30) + 'px';
        white.style.top = (y + Math.sin(angle) * 30) + 'px';
        const size = 30 + Math.random() * 30;
        white.style.width = size + 'px';
        white.style.height = (size * 0.7) + 'px';
        white.style.animationDelay = (i * 0.08) + 's';
        document.body.appendChild(white);
        setTimeout(() => white.remove(), 1100);
      }

      // иӣӢеЈізўҺзүҮзІ’еӯҗ
      const shellColors = ['#fff8e1','#ffe082','#ffca28'];
      for (let i = 0; i < 6; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.background = shellColors[Math.floor(Math.random() * shellColors.length)];
        p.style.width = (4 + Math.random() * 6) + 'px';
        p.style.height = p.style.width;
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        const angle = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 60;
        p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--py', Math.sin(angle) * dist - 20 + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 700);
      }
    }

    // ============ жү“еҮ»йҖ»иҫ‘ ============
    function doHit() {
      count++;
      countEl.textContent = count;
      localStorage.setItem('hit-count', count);

      const isCrit = count % 10 === 0;
      const weapon = getActiveWeapon();

      if (isCrit) playCritSound(weapon.id); else playHitSound(weapon.id);

      // жҠ•жҺ·зұ»жӯҰеҷЁпјҡе…Ҳж’ӯеҠЁз”»пјҢеҠЁз”»дёӯйҖ”и§ҰеҸ‘жү“еҮ»
      const projectileWeapons = ['shoe', 'egg', 'veggie', 'club'];
      const needAnimation = projectileWeapons.includes(weapon.id);

      if (needAnimation) {
        animateProjectile(weapon.id, () => {
          applyHitEffect(weapon, isCrit);
        });
      } else {
        applyHitEffect(weapon, isCrit);
      }
    }

    function applyHitEffect(weapon, isCrit) {
      dollWrapper.classList.remove('hit', 'hit-hard');
      void dollWrapper.offsetWidth;
      dollWrapper.classList.add(isCrit ? 'hit-hard' : 'hit');

      if (hitMark) {
        hitMark.setAttribute('opacity', '1');
        setTimeout(() => hitMark.setAttribute('opacity', '0'), 300);
      }

      const texts = isCrit ? weapon.critTexts : weapon.hitTexts;
      spawnFloatingText(texts[Math.floor(Math.random() * texts.length)], isCrit);
      if (isCrit) spawnParticles();

      // жғЁеҸ«еЈ° вҖ” жҡҙеҮ»еҝ…еҸ«пјҢжҷ®йҖҡжү“еҮ» 35% жҰӮзҺҮеҸ«
      const screamChance = isCrit ? 0.85 : 0.35;
      if (Math.random() < screamChance) {
        // е»¶иҝҹдёҖзӮ№зӮ№пјҢе’Ңжү“еҮ»йҹіж•Ҳй”ҷејҖ
        setTimeout(() => playScream(), 30);
      }

      comboCount++;
      clearTimeout(comboTimer);
      if (comboCount >= 3) {
        comboEl.textContent = `рҹ”Ҙ иҝһеҮ» x${comboCount}`;
        comboEl.classList.add('show');
      }
      comboTimer = setTimeout(() => {
        comboCount = 0;
        comboEl.classList.remove('show');
      }, 1200);
    }

    function spawnFloatingText(text, isCrit) {
      const el = document.createElement('div');
      el.className = 'hit-effect' + (isCrit ? ' crit' : Math.random() > 0.5 ? ' alt' : '');
      el.textContent = text;
      const rect = dollWrapper.getBoundingClientRect();
      el.style.left = (rect.left + rect.width / 2 - 30 + (Math.random() - 0.5) * 80) + 'px';
      el.style.top = (rect.top + 20 + Math.random() * 40) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 750);
    }

    function spawnParticles() {
      const rect = dollWrapper.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const colors = ['#e91e63','#ff5722','#ff9800','#ffeb3b','#4caf50','#2196f3'];
      for (let i = 0; i < 10; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        const angle = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 80;
        p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--py', Math.sin(angle) * dist - 40 + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 650);
      }
    }

    // ============ дәӢд»¶з»‘е®ҡ ============
    dollArea.addEventListener('click', (e) => { e.preventDefault(); doHit(); });
    hitBtn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); doHit(); });

    autoToggle.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      autoMode = !autoMode;
      autoToggle.textContent = autoMode ? 'рҹ”Ғ иҮӘеҠЁжҡҙжү“: ејҖ' : 'рҹ”Ғ иҮӘеҠЁжҡҙжү“: е…і';
      autoToggle.classList.toggle('active', autoMode);
      hitBtn.classList.toggle('auto-on', autoMode);
      if (autoMode) {
        doHit();
        autoInterval = setInterval(doHit, 120);
      } else {
        clearInterval(autoInterval);
        autoInterval = null;
      }
    });

    // й•ҝжҢүжҒўеӨҚй»ҳи®Өи„ё
    let longPressTimer = null;
    faceBtn.addEventListener('touchstart', () => {
      longPressTimer = setTimeout(() => { resetFace(); }, 600);
    });
    faceBtn.addEventListener('touchend', () => clearTimeout(longPressTimer));
    faceBtn.addEventListener('mousedown', () => {
      longPressTimer = setTimeout(() => { resetFace(); }, 600);
    });
    faceBtn.addEventListener('mouseup', () => clearTimeout(longPressTimer));
    faceBtn.addEventListener('mouseleave', () => clearTimeout(longPressTimer));

    document.querySelector('.bottom-bar').addEventListener('click', (e) => e.stopPropagation());

    // ===================== иЈҒеүӘеј№зӘ—йҖ»иҫ‘ =====================
    const cropOverlay = document.getElementById('crop-overlay');
    const cropCanvas = document.getElementById('crop-canvas');
    const cropCtx = cropCanvas.getContext('2d');
    const cropWrap = document.getElementById('crop-wrap');
    const cropScaleInput = document.getElementById('crop-scale');
    const cropCancel = document.getElementById('crop-cancel');
    const cropConfirm = document.getElementById('crop-confirm');

    const CANVAS_W = 280;
    const CANVAS_H = 280;
    const CIRCLE_R = 80;
    const CIRCLE_CX = CANVAS_W / 2;
    const CIRCLE_CY = CANVAS_H / 2;

    let cropImg = null;
    let cropState = { x: 0, y: 0, scale: 1, dragging: false, lastX: 0, lastY: 0 };
    let pendingDataUrl = null;

    function drawCrop() {
      cropCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      if (!cropImg) return;

      const imgW = cropImg.width * cropState.scale;
      const imgH = cropImg.height * cropState.scale;
      cropCtx.drawImage(cropImg, CIRCLE_CX - imgW/2 + cropState.x, CIRCLE_CY - imgH/2 + cropState.y, imgW, imgH);

      // йҒ®зҪ©пјҲжҢ–еңҶжҙһпјү
      cropCtx.save();
      cropCtx.fillStyle = 'rgba(0,0,0,0.5)';
      cropCtx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      cropCtx.globalCompositeOperation = 'destination-out';
      cropCtx.beginPath();
      cropCtx.arc(CIRCLE_CX, CIRCLE_CY, CIRCLE_R, 0, Math.PI * 2);
      cropCtx.fill();
      cropCtx.restore();

      // зҷҪиүІеңҶиҫ№жЎҶ
      cropCtx.beginPath();
      cropCtx.arc(CIRCLE_CX, CIRCLE_CY, CIRCLE_R, 0, Math.PI * 2);
      cropCtx.strokeStyle = '#fff';
      cropCtx.lineWidth = 3;
      cropCtx.stroke();

      // еҚҒеӯ—иҫ…еҠ©зәҝ
      cropCtx.strokeStyle = 'rgba(255,255,255,0.3)';
      cropCtx.lineWidth = 1;
      cropCtx.beginPath(); cropCtx.moveTo(CIRCLE_CX, CIRCLE_CY - CIRCLE_R); cropCtx.lineTo(CIRCLE_CX, CIRCLE_CY + CIRCLE_R); cropCtx.stroke();
      cropCtx.beginPath(); cropCtx.moveTo(CIRCLE_CX - CIRCLE_R, CIRCLE_CY); cropCtx.lineTo(CIRCLE_CX + CIRCLE_R, CIRCLE_CY); cropCtx.stroke();
    }

    function openCrop(dataUrl) {
      cropImg = new Image();
      cropImg.onload = () => {
        const minDim = Math.min(cropImg.width, cropImg.height);
        cropState.scale = (CIRCLE_R * 2) / minDim;
        cropState.x = 0;
        cropState.y = 0;
        cropScaleInput.value = Math.round(cropState.scale * 100);
        pendingDataUrl = dataUrl;
        cropOverlay.classList.add('show');
        drawCrop();
      };
      cropImg.src = dataUrl;
    }

    function closeCrop() {
      cropOverlay.classList.remove('show');
      cropImg = null;
      pendingDataUrl = null;
    }

    function confirmCrop() {
      if (!cropImg) { closeCrop(); return; }

      const temp = document.createElement('canvas');
      temp.width = CANVAS_W;
      temp.height = CANVAS_H;
      const tctx = temp.getContext('2d');
      tctx.beginPath();
      tctx.arc(CIRCLE_CX, CIRCLE_CY, CIRCLE_R, 0, Math.PI * 2);
      tctx.clip();

      const imgW = cropImg.width * cropState.scale;
      const imgH = cropImg.height * cropState.scale;
      tctx.drawImage(cropImg, CIRCLE_CX - imgW/2 + cropState.x, CIRCLE_CY - imgH/2 + cropState.y, imgW, imgH);

      const out = document.createElement('canvas');
      out.width = CIRCLE_R * 2;
      out.height = CIRCLE_R * 2;
      const octx = out.getContext('2d');
      octx.drawImage(
        temp,
        CIRCLE_CX - CIRCLE_R, CIRCLE_CY - CIRCLE_R, CIRCLE_R * 2, CIRCLE_R * 2,
        0, 0, CIRCLE_R * 2, CIRCLE_R * 2
      );

      const finalUrl = out.toDataURL('image/png');
      applyFaceImage(finalUrl);
      localStorage.setItem('hit-doll-face', finalUrl);
      closeCrop();
    }

    // ж–Үд»¶йҖүжӢ© вҶ’ жү“ејҖиЈҒеүӘеј№зӘ—
    faceBtn.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => openCrop(ev.target.result);
      reader.readAsDataURL(file);
      fileInput.value = '';
    });

    // жӢ–жӢҪ
    cropWrap.addEventListener('mousedown', (e) => {
      cropState.dragging = true;
      cropState.lastX = e.clientX;
      cropState.lastY = e.clientY;
    });
    cropWrap.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        cropState.dragging = true;
        cropState.lastX = e.touches[0].clientX;
        cropState.lastY = e.touches[0].clientY;
      }
    }, { passive: false });

    window.addEventListener('mousemove', (e) => {
      if (!cropState.dragging) return;
      cropState.x += e.clientX - cropState.lastX;
      cropState.y += e.clientY - cropState.lastY;
      cropState.lastX = e.clientX;
      cropState.lastY = e.clientY;
      drawCrop();
    });
    window.addEventListener('touchmove', (e) => {
      if (!cropState.dragging || e.touches.length !== 1) return;
      e.preventDefault();
      cropState.x += e.touches[0].clientX - cropState.lastX;
      cropState.y += e.touches[0].clientY - cropState.lastY;
      cropState.lastX = e.touches[0].clientX;
      cropState.lastY = e.touches[0].clientY;
      drawCrop();
    }, { passive: false });

    function endDrag() { cropState.dragging = false; }
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    // зј©ж”ҫ
    cropScaleInput.addEventListener('input', (e) => {
      cropState.scale = parseInt(e.target.value) / 100;
      drawCrop();
    });

    // ж»ҡиҪ®зј©ж”ҫ
    cropWrap.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.05 : 0.05;
      cropState.scale = Math.max(0.3, Math.min(3, cropState.scale + delta));
      cropScaleInput.value = Math.round(cropState.scale * 100);
      drawCrop();
    }, { passive: false });

    // еҸҢжҢҮзј©ж”ҫ
    let pinchDist = 0;
    cropWrap.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      }
    }, { passive: false });
    cropWrap.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const newDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const ratio = newDist / pinchDist;
        cropState.scale = Math.max(0.3, Math.min(3, cropState.scale * ratio));
        cropScaleInput.value = Math.round(cropState.scale * 100);
        pinchDist = newDist;
        drawCrop();
      }
    }, { passive: false });

    // жҢүй’®
    cropCancel.addEventListener('click', closeCrop);
    cropConfirm.addEventListener('click', confirmCrop);
  </script>
</body>
</html>
