<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>打小人 - 情绪释放</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 顶部栏 */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      z-index: 10;
    }

    .counter {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 15px;
      font-weight: 600;
      color: #c2185b;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .counter span { font-size: 22px; font-weight: 800; }

    .upload-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }
    .upload-btn:active { transform: scale(0.9); }
    #file-input { display: none; }

    /* 小人区域 */
    .doll-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      cursor: pointer;
      position: relative;
    }

    .doll-wrapper {
      position: relative;
      transition: transform 0.08s;
    }
    .doll-wrapper.hit {
      animation: hitShake 0.25s ease-out;
    }
    .doll-wrapper.hit-hard {
      animation: hitHard 0.35s ease-out;
    }

    @keyframes hitShake {
      0%   { transform: translateX(0) rotate(0); }
      20%  { transform: translateX(-12px) rotate(-4deg); }
      40%  { transform: translateX(10px) rotate(3deg); }
      60%  { transform: translateX(-8px) rotate(-2deg); }
      80%  { transform: translateX(5px) rotate(1deg); }
      100% { transform: translateX(0) rotate(0); }
    }

    @keyframes hitHard {
      0%   { transform: scale(1) rotate(0); }
      15%  { transform: scale(0.85) rotate(-8deg); }
      30%  { transform: scale(1.05) rotate(5deg); }
      50%  { transform: scale(0.9) rotate(-3deg); }
      70%  { transform: scale(1.02) rotate(2deg); }
      100% { transform: scale(1) rotate(0); }
    }

    /* 默认小人 SVG */
    .doll-default {
      width: 180px;
      height: 260px;
    }

    /* 自定义图片 */
    .doll-img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid rgba(255,255,255,0.7);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    /* 打击特效 */
    .hit-effect {
      position: absolute;
      pointer-events: none;
      font-size: 40px;
      font-weight: 900;
      color: #d32f2f;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      animation: floatUp 0.7s ease-out forwards;
      z-index: 5;
    }
    .hit-effect.alt { color: #f57c00; font-size: 35px; }
    .hit-effect.crit { color: #c2185b; font-size: 50px; }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-120px) scale(1.3); }
    }

    /* 底部控制栏 */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 20px 32px;
      gap: 12px;
      z-index: 10;
    }

    .hit-btn {
      width: 100%;
      max-width: 320px;
      height: 56px;
      border-radius: 28px;
      border: none;
      font-size: 20px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #e91e63, #c2185b);
      box-shadow: 0 6px 20px rgba(194,24,91,0.4);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 2px;
    }
    .hit-btn:active { transform: scale(0.95); box-shadow: 0 2px 10px rgba(194,24,91,0.3); }
    .hit-btn.auto-on {
      background: linear-gradient(135deg, #ff7043, #e64a19);
      box-shadow: 0 6px 20px rgba(230,74,25,0.4);
    }

    .auto-toggle {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border: none;
      border-radius: 20px;
      padding: 8px 24px;
      font-size: 14px;
      color: #c2185b;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .auto-toggle:active { transform: scale(0.95); }
    .auto-toggle.active {
      background: rgba(194,24,91,0.1);
      color: #880e4f;
    }

    /* 连击提示 */
    .combo {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 6px 18px;
      font-size: 14px;
      font-weight: 700;
      color: #e91e63;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
    }
    .combo.show { opacity: 1; }

    /* 碎屑粒子 */
    .particle {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFly 0.6s ease-out forwards;
    }
    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
    }
  </style>
</head>
<body>

  <!-- 顶部栏 -->
  <div class="top-bar">
    <div class="counter">已打 <span id="count">0</span> 下</div>
    <button class="upload-btn" id="upload-btn" title="更换脸图">👤</button>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <!-- 连击提示 -->
  <div class="combo" id="combo"></div>

  <!-- 小人区域 -->
  <div class="doll-area" id="doll-area">
    <div class="doll-wrapper" id="doll-wrapper">
      <!-- 默认 SVG 小人 -->
      <svg class="doll-default" id="doll-svg" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
        <!-- 身体 -->
        <circle cx="100" cy="100" r="45" fill="#ffccbc"/>
        <!-- 眼睛 -->
        <circle cx="82" cy="90" r="6" fill="#333"/>
        <circle cx="118" cy="90" r="6" fill="#333"/>
        <!-- 嘴巴（委屈状） -->
        <path d="M88 120 Q100 108 112 120" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- 腮红 -->
        <circle cx="72" cy="105" r="8" fill="#ffab91" opacity="0.6"/>
        <circle cx="128" cy="105" r="8" fill="#ffab91" opacity="0.6"/>
        <!-- 身体 -->
        <rect x="70" y="140" width="60" height="70" rx="20" fill="#ef9a9a"/>
        <!-- 手 -->
        <circle cx="45" cy="165" r="16" fill="#ffccbc"/>
        <circle cx="155" cy="165" r="16" fill="#ffccbc"/>
        <!-- 脚 -->
        <rect x="75" y="205" width="20" height="40" rx="10" fill="#ef9a9a"/>
        <rect x="105" y="205" width="20" height="40" rx="10" fill="#ef9a9a"/>
        <!-- 被打的特效十字 -->
        <g id="hit-mark" opacity="0">
          <line x1="70" y1="75" x2="90" y2="95" stroke="#d32f2f" stroke-width="4" stroke-linecap="round"/>
          <line x1="90" y1="75" x2="70" y2="95" stroke="#d32f2f" stroke-width="4" stroke-linecap="round"/>
          <line x1="110" y1="75" x2="130" y2="95" stroke="#d32f2f" stroke-width="4" stroke-linecap="round"/>
          <line x1="130" y1="75" x2="110" y2="95" stroke="#d32f2f" stroke-width="4" stroke-linecap="round"/>
        </g>
      </svg>
      <!-- 自定义图片（默认隐藏） -->
      <img class="doll-img" id="doll-img" style="display:none" alt="自定义小人">
    </div>
  </div>

  <!-- 底部控制栏 -->
  <div class="bottom-bar">
    <button class="auto-toggle" id="auto-toggle">🔁 自动暴打: 关</button>
    <button class="hit-btn" id="hit-btn">👊 打！</button>
  </div>

  <script>
    // ============ 音效系统（Web Audio API，无需外部文件） ============
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playHitSound() {
      ensureAudio();
      const ctx = audioCtx;
      const now = ctx.currentTime;

      // 打击音：噪音 + 短促低频
      // 1. 噪音突发
      const bufferSize = ctx.sampleRate * 0.08;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;

      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.5, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 800 + Math.random() * 600;
      filter.Q.value = 1;

      noise.connect(filter).connect(noiseGain).connect(ctx.destination);
      noise.start(now);
      noise.stop(now + 0.1);

      // 2. 低频撞击感
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);

      const oscGain = ctx.createGain();
      oscGain.gain.setValueAtTime(0.4, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

      osc.connect(oscGain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.12);
    }

    function playCritSound() {
      ensureAudio();
      const ctx = audioCtx;
      const now = ctx.currentTime;

      // 暴击音：更长的噪音 + 更低的频率
      const bufferSize = ctx.sampleRate * 0.15;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;

      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.7, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);

      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1200;
      filter.Q.value = 2;

      noise.connect(filter).connect(noiseGain).connect(ctx.destination);
      noise.start(now);
      noise.stop(now + 0.2);

      // 低频冲击
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(100, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);

      const oscGain = ctx.createGain();
      oscGain.gain.setValueAtTime(0.5, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

      osc.connect(oscGain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.2);
    }

    // ============ 状态 ============
    let count = parseInt(localStorage.getItem('hit-count') || '0');
    let autoMode = false;
    let autoInterval = null;
    let comboCount = 0;
    let comboTimer = null;
    let lastCustomImg = localStorage.getItem('hit-doll-img');

    // DOM
    const countEl = document.getElementById('count');
    const dollArea = document.getElementById('doll-area');
    const dollWrapper = document.getElementById('doll-wrapper');
    const dollSvg = document.getElementById('doll-svg');
    const dollImg = document.getElementById('doll-img');
    const hitBtn = document.getElementById('hit-btn');
    const autoToggle = document.getElementById('auto-toggle');
    const uploadBtn = document.getElementById('upload-btn');
    const fileInput = document.getElementById('file-input');
    const comboEl = document.getElementById('combo');
    const hitMark = document.getElementById('hit-mark');

    countEl.textContent = count;

    // ============ 加载自定义图片 ============
    if (lastCustomImg) {
      dollSvg.style.display = 'none';
      dollImg.style.display = 'block';
      dollImg.src = lastCustomImg;
    }

    // ============ 打击逻辑 ============
    const hitTexts = ['啪！', '咚！', 'duang！', '嘭！', '💥', '⚡', '👊', '😤'];
    const critTexts = ['暴击！', '连击！', '火星四溅！', '💢', '🔥', '💫'];

    function doHit() {
      count++;
      countEl.textContent = count;
      localStorage.setItem('hit-count', count);

      // 音效
      const isCrit = count % 10 === 0;
      if (isCrit) {
        playCritSound();
      } else {
        playHitSound();
      }

      // 动画
      dollWrapper.classList.remove('hit', 'hit-hard');
      void dollWrapper.offsetWidth; // 强制重排
      dollWrapper.classList.add(isCrit ? 'hit-hard' : 'hit');

      // 打击标记（SVG 十字）
      if (hitMark) {
        hitMark.setAttribute('opacity', '1');
        setTimeout(() => hitMark.setAttribute('opacity', '0'), 300);
      }

      // 浮动文字
      const texts = isCrit ? critTexts : hitTexts;
      spawnFloatingText(texts[Math.floor(Math.random() * texts.length)], isCrit);

      // 粒子
      if (isCrit) spawnParticles();

      // 连击
      comboCount++;
      clearTimeout(comboTimer);
      if (comboCount >= 3) {
        comboEl.textContent = `🔥 连击 x${comboCount}`;
        comboEl.classList.add('show');
      }
      comboTimer = setTimeout(() => {
        comboCount = 0;
        comboEl.classList.remove('show');
      }, 1200);
    }

    function spawnFloatingText(text, isCrit) {
      const el = document.createElement('div');
      el.className = 'hit-effect' + (isCrit ? ' crit' : Math.random() > 0.5 ? ' alt' : '');
      el.textContent = text;
      const rect = dollWrapper.getBoundingClientRect();
      el.style.left = (rect.left + rect.width / 2 - 30 + (Math.random() - 0.5) * 80) + 'px';
      el.style.top = (rect.top + 20 + Math.random() * 40) + 'px';
      el.style.position = 'fixed';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 750);
    }

    function spawnParticles() {
      const rect = dollWrapper.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const colors = ['#e91e63','#ff5722','#ff9800','#ffeb3b','#4caf50','#2196f3'];
      for (let i = 0; i < 10; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        p.style.position = 'fixed';
        const angle = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 80;
        p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--py', Math.sin(angle) * dist - 40 + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 650);
      }
    }

    // ============ 事件绑定 ============
    // 点击屏幕打
    dollArea.addEventListener('click', (e) => {
      e.preventDefault();
      doHit();
    });

    // 打按钮
    hitBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      doHit();
    });

    // 自动暴打切换
    autoToggle.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      autoMode = !autoMode;
      autoToggle.textContent = autoMode ? '🔁 自动暴打: 开' : '🔁 自动暴打: 关';
      autoToggle.classList.toggle('active', autoMode);
      hitBtn.classList.toggle('auto-on', autoMode);

      if (autoMode) {
        doHit(); // 立即打一下
        autoInterval = setInterval(doHit, 120);
      } else {
        clearInterval(autoInterval);
        autoInterval = null;
      }
    });

    // 上传图片
    uploadBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const dataUrl = ev.target.result;
        dollSvg.style.display = 'none';
        dollImg.style.display = 'block';
        dollImg.src = dataUrl;
        // 保存到 localStorage（仅限图片数据，不上传服务器）
        localStorage.setItem('hit-doll-img', dataUrl);
      };
      reader.readAsDataURL(file);
    });

    // 重置图片
    dollImg.addEventListener('dblclick', (e) => {
      e.preventDefault();
      e.stopPropagation();
      localStorage.removeItem('hit-doll-img');
      dollSvg.style.display = 'block';
      dollImg.style.display = 'none';
    });

    // 阻止底部栏点击冒泡到 dollArea
    document.querySelector('.bottom-bar').addEventListener('click', (e) => {
      e.stopPropagation();
    });
  </script>
</body>
</html>
